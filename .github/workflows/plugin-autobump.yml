name: Plugin autobump

on:
  workflow_call:
    inputs:
      dry-run:
        type: boolean
        default: false
      guard-plugins:
        type: string
        default: ""
      exclude-paths:
        type: string
        default: ""
      strict:
        type: boolean
        default: false
      script-ref:
        type: string
        default: "plugin-v1"

jobs:
  autobump:
    runs-on: ubuntu-latest
    concurrency:
      group: "plugin-autobump-${{ github.repository }}"
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # No context magic: job_workflow_sha AND job_workflow_ref observed empty on cross-repo calls
      - name: Resolve pinned script ref
        id: script-ref
        run: |
          if [ "${{ github.repository }}" = "yasyf/cc-skills" ]; then
            REF="${{ github.sha }}"
          else
            REF="${{ inputs.script-ref }}"
          fi
          echo "resolved script ref: $REF"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      # Script + workflow stay in lockstep at the caller's pinned ref — never main.
      - uses: actions/checkout@v7
        with:
          repository: yasyf/cc-skills
          ref: ${{ steps.script-ref.outputs.ref }}
          path: .autobump-src
          sparse-checkout: .github/scripts

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Detect drift and bump
        env:
          AUTOBUMP_DRY_RUN: ${{ inputs.dry-run }}
          AUTOBUMP_GUARD: ${{ inputs.guard-plugins }}
          AUTOBUMP_EXCLUDES: ${{ inputs.exclude-paths }}
          AUTOBUMP_STRICT: ${{ github.event_name == 'schedule' || inputs.strict }}
        run: uv run .autobump-src/.github/scripts/plugin_autobump.py
