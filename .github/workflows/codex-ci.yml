name: codex CI

on:
  push:
    paths:
      - ".goreleaser.yaml"
      - "plugins/codex/**"
      - "plugins/repo-bootstrap/tests/test_scaffold.py"
  pull_request:
    paths:
      - ".goreleaser.yaml"
      - "plugins/codex/**"
      - "plugins/repo-bootstrap/tests/test_scaffold.py"

permissions:
  contents: read

jobs:
  codex-ask:
    # Goldens shell `/bin/ps -o lstart=` and assert the setsid detach path (macOS
    # process semantics); codex-ask ships darwin-only. Runs where the binary lives.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      # The plugin manifest and the binrun descriptor must pin the same version
      # (the marketplace serves plugin.json; hooks and MCP resolve the pinned
      # artifact through bin/codex-ask.binrun).
      - name: Assert plugin manifest and descriptor agree on version
        run: |
          manifest="$(jq -r .version plugins/codex/.claude-plugin/plugin.json)"
          descriptor="$(tail -n +2 plugins/codex/bin/codex-ask.binrun | jq -r .version.static)"
          test "$manifest" = "$descriptor" \
            || { echo "version drift: plugin.json=$manifest descriptor=$descriptor" >&2; exit 1; }
      - uses: actions/setup-go@v6
        with:
          go-version-file: plugins/codex/go.mod
      - uses: astral-sh/setup-uv@v8.2.0
      - name: build, vet, test (race)
        run: |
          mkdir -p /tmp/codex-ci
          cd plugins/codex && go build -o /tmp/codex-ci/codex-ask ./ && go vet ./... && go test -race ./...
      - name: release build parity (CGO_ENABLED=0, goreleaser's env)
        run: cd plugins/codex && CGO_ENABLED=0 go build -o /dev/null .
      - name: repo-bootstrap codex-ask goldens
        run: uv run --project plugins/repo-bootstrap pytest plugins/repo-bootstrap/tests/test_scaffold.py -k codex_ask -q
      - name: capt-hook pack test
        run: uvx --isolated 'capt-hook>=11.0.0' pack test plugins/codex
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: plugins/codex
