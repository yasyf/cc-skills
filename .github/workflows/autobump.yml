name: Autobump

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
      strict:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  autobump:
    uses: ./.github/workflows/plugin-autobump.yml
    with:
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      strict: ${{ github.event_name == 'workflow_dispatch' && inputs.strict || false }}
      guard-plugins: "codex"
