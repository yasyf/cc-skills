name: codex Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # codex is the only plugin here shipping a binary, so a bare v* tag is a codex
  # release. install-binary.sh pins the download to plugin.json's version, so a
  # mismatched tag ships a plugin that 404s.
  verify-plugin-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: plugin.json version matches the tag
        run: |
          # First match only: the dependencies entries carry "version" keys of their own.
          V="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' plugins/codex/.claude-plugin/plugin.json | head -n 1)"
          if [ "v$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error file=plugins/codex/.claude-plugin/plugin.json::plugin.json version is $V but the tag is $GITHUB_REF_NAME — set it to ${GITHUB_REF_NAME#v} in the release commit, then retag"
            exit 1
          fi

  verify-signing-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Require Developer ID and notarization credentials
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in MACOS_SIGN_P12 MACOS_SIGN_PASSWORD MACOS_NOTARY_KEY MACOS_NOTARY_KEY_ID MACOS_NOTARY_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for a codex release"
              exit 1
            fi
          done

  release:
    needs: [verify-plugin-version, verify-signing-secrets]
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@3bfe1af3bdc10ec783e79050e7c647152a537801
    secrets: inherit
    with:
      runner: macos-latest
      signer: codesign
      go-version-file: plugins/codex/go.mod
