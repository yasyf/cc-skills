name: codex Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # codex is the only plugin here shipping a binary, so a bare v* tag is a codex
  # release. plugin.json is deliberately NOT pre-bumped to the tag: the binrun
  # shim resolves the download from the committed descriptor
  # (plugins/codex/bin/codex-ask.binrun), not plugin.json, and the descriptor
  # job below moves both to the released version in one post-release commit. A
  # pre-release plugin.json bump would lead the descriptor and trip the codex-ci
  # version-agreement gate on every release-prep commit (red on a failed
  # release, which never reaches the descriptor job).
  verify-signing-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Require Developer ID and notarization credentials
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in MACOS_SIGN_P12 MACOS_SIGN_PASSWORD MACOS_NOTARY_KEY MACOS_NOTARY_KEY_ID MACOS_NOTARY_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for a codex release"
              exit 1
            fi
          done

  release:
    needs: [verify-signing-secrets]
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@52b26a1684d94ae2669d124f844148deaa4f5baf
    secrets: inherit
    with:
      runner: macos-latest
      signer: codesign
      go-version-file: plugins/codex/go.mod
      pre-build: echo "MACOS_CODESIGN_IDENTIFIER=com.yasyf.codex-ask" >> "$GITHUB_ENV"

  # Refresh the committed binrun descriptor (plugins/codex/bin/codex-ask.binrun)
  # to pin the just-released version, and move the plugin manifest to the same
  # version in the SAME commit. It gates on `release` (rather than a
  # `release: published` trigger) because a release goreleaser creates with the
  # default GITHUB_TOKEN does not fire `release` events for other workflows. Both
  # files are committed back to main because the plugin marketplace serves main
  # HEAD, and the descriptor is re-uploaded to the release for parity. Bumping
  # plugin.json here (not in a separate hand commit) keeps it in lockstep with
  # the descriptor, so the CI agreement gate stays green after every release.
  descriptor:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-go@v6
        with:
          go-version-file: plugins/codex/go.mod
          cache: true
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --dir dist --pattern '*.tar.gz' --pattern 'checksums.txt'
      - name: Render descriptor and sync manifest version
        run: |
          version="${GITHUB_REF_NAME#v}"
          plugins/codex/scripts/render-descriptor.sh dist "$version" > plugins/codex/bin/codex-ask.binrun
          chmod +x plugins/codex/bin/codex-ask.binrun
          jq --arg v "$version" '.version = $v' plugins/codex/.claude-plugin/plugin.json > plugins/codex/.claude-plugin/plugin.json.tmp
          mv plugins/codex/.claude-plugin/plugin.json.tmp plugins/codex/.claude-plugin/plugin.json
      - name: Validate descriptor
        run: go run github.com/yasyf/binrun/cmd/binrun@v0.1.1 -- parse plugins/codex/bin/codex-ask.binrun
      - name: Assert manifest and descriptor agree on version
        run: |
          manifest="$(jq -r .version plugins/codex/.claude-plugin/plugin.json)"
          descriptor="$(tail -n +2 plugins/codex/bin/codex-ask.binrun | jq -r .version.static)"
          test "$manifest" = "$descriptor" \
            || { echo "version drift: plugin.json=$manifest descriptor=$descriptor" >&2; exit 1; }
      - name: Commit refreshed descriptor and manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plugins/codex/bin/codex-ask.binrun plugins/codex/.claude-plugin/plugin.json; then
            echo "descriptor and manifest already current for ${GITHUB_REF_NAME}"
          else
            git add plugins/codex/bin/codex-ask.binrun plugins/codex/.claude-plugin/plugin.json
            git commit -m "chore(codex): sync codex-ask.binrun + manifest to ${GITHUB_REF_NAME}"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Upload descriptor to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" plugins/codex/bin/codex-ask.binrun --repo "${GITHUB_REPOSITORY}" --clobber
