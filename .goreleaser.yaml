version: 2

project_name: codex-ask

# Pure Go (CGO_ENABLED=0), darwin-only; Developer ID signing and notarization are required.
builds:
  - id: codex-ask
    # dir = go build's working dir (the nested module); main is relative to it.
    dir: plugins/codex
    main: .
    binary: codex-ask
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.appVersion={{.Version}}
    # Fail closed unless the shared release workflow supplied signing and notary state.
    hooks:
      post:
        - cmd: sh -c 'test -n "${MACOS_CODESIGN_SCRIPT:-}" && test -n "${MACOS_SIGN_IDENTITY:-}" && test -n "${MACOS_NOTARY_KEY_FILE:-}" && test -n "${MACOS_NOTARY_KEY_ID:-}" && test -n "${MACOS_NOTARY_ISSUER:-}" || { echo "macos signing and notarization state is required" >&2; exit 1; }; bash "$MACOS_CODESIGN_SCRIPT" "$1" "$2"' -- "{{ .Path }}" "{{ .Target }}"
          output: true

archives:
  - id: codex-ask
    ids: [codex-ask]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  # Bare per-arch binaries for the plugin's install-binary.sh; the cask keeps the tar.gz.
  - id: binary
    ids: [codex-ask]
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: codex-ask
    # Pin the cask to the tar.gz; the bare-binary archive would make the pipe ambiguous.
    ids: [codex-ask]
    binaries:
      - codex-ask
    repository:
      owner: yasyf
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/yasyf/cc-skills
    description: The one way the codex plugin runs OpenAI Codex — a pinned, detach-survivable `codex exec` launcher with fan-out mint/collect/await.

release:
  prerelease: auto

changelog:
  use: github
  sort: asc
