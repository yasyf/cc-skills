# Swift: SwiftFormat (nicklockwood) + SwiftLint. Continues the `repos:` list
# precommit-base opens.
#
# Deliberately `repo: local` + `language: system` against the brew-installed
# binaries (brew install swiftformat swiftlint): the upstream repos' pre-commit
# hooks build the tools from source via SPM on first run (minutes-long), so the
# local-system form is the fast path. Don't "upgrade" this to the remote hooks.
  - repo: local
    hooks:
      - id: swiftformat
        name: swiftformat
        entry: swiftformat
        language: system
        types: [swift]
      - id: swiftlint
        name: swiftlint
        entry: swiftlint --quiet
        language: system
        types: [swift]
