name: Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "{{PACKAGE}}/**"
      - "great-docs.yml"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true
