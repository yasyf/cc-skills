# Great Docs configuration — https://posit-dev.github.io/great-docs/
# Build: uv run --with "git+https://github.com/yasyf/cc-skills@main#subdirectory=tools/gd-build" gd-build build
# Preview: uv run great-docs preview (after a first gd-build run materializes the pre_render script)

module: {{PACKAGE}}
display_name: {{PROJECT_NAME}}
dynamic: true
repo: {{REPO_URL}}
site_url: "{{DOCS_URL}}"
pypi: {{#FEATURE_PYPI}}true{{/FEATURE_PYPI}}{{^FEATURE_PYPI}}false{{/FEATURE_PYPI}}

# Conservative defaults: a solid navbar and a single accent, no gradient
# presets or hero starfield. The gradient/starfield extras read as busy and the
# starfield canvas intercepts homepage clicks; keep them off unless asked.
# TODO(bootstrap): replace these seed colors with picks derived from the
# docs/assets/logo.png mascot palette. navbar_color: a deep tone from the
# mascot (white navbar text >=4.5:1). accent_color doubles as the link color:
# use {light: ..., dark: ...} — light >=4.5:1 on white, dark >=4.5:1 on
# #1a1a1a (darken/lighten the mascot hue until both pass WCAG AA).
navbar_color: "#1e293b"
accent_color: "#3b82f6"

# Navbar logo + favicon are auto-detected from docs/assets/logo.png (the
# generated mascot); no logo key is needed here.
hero:
  name: {{PROJECT_NAME}}
  # Keep the tagline equal to the README opener fragment (one fragment, five surfaces).
  tagline: "{{DESCRIPTION}}"

# Narrative doc sections are optional — dynamic mode generates the API reference
# from docstrings without them. Uncomment and point at docs/ dirs as they appear.
# sections:
#   - title: Getting Started
#     dir: docs/getting-started
#     index: true
#   - title: Guide
#     dir: docs/guide
#     navbar_after: Getting Started
#     index: true

cli:
  enabled: true
  module: {{PACKAGE}}.cli
  name: cli

authors:
  - name: {{AUTHOR_NAME}}
    role: Maintainer
    github: {{GITHUB_USER}}
    email: {{AUTHOR_EMAIL}}

# Curated symbol reference (public API only). Optional — without it, dynamic
# mode documents everything in {{PACKAGE}}.__all__.
# reference:
#   - title: Core
#     desc: The main entry points.
#     contents:
#       - SomePublicClass
#       - some_public_function
