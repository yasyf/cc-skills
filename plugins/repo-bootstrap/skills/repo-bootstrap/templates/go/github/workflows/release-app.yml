name: Release App

# Signed, notarized .app release for the {{PROJECT_NAME}} helper app (the
# daemonkit `helper-app` feature). Wraps {{PROJECT_NAME}}d in an LSUIElement
# bundle and publishes a Homebrew cask. The helper/ XcodeGen project and the
# cask template render from daemonkit's templates/ (project.yml.tmpl,
# entitlements, cask.rb.tmpl) — see templates/README.md in yasyf/daemonkit.

on:
  push:
    tags: ["v*"]

# The reusable release job attaches the built .app to the GitHub release; a
# called workflow can't exceed the caller's token grant, and a default-read
# repo dies at startup_failure without this.
permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      marketing: ${{ steps.derive.outputs.marketing }}
      stable: ${{ steps.derive.outputs.stable }}
    steps:
      - id: derive
        shell: bash
        # release-app.yml requires bare MAJOR.MINOR.PATCH: strip the tag's v
        # prefix and any prerelease suffix.
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          echo "marketing=${v%%-*}" >> "$GITHUB_OUTPUT"
          case "$GITHUB_REF_NAME" in
            *-*) echo "stable=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "stable=true" >> "$GITHUB_OUTPUT" ;;
          esac

  release:
    needs: version
    uses: {{GITHUB_USER}}/homebrew-tap/.github/workflows/release-app.yml@f45550932b0c8a42eb04e9ab0e5de8f82ad78b6a
    secrets: inherit
    with:
      app_name: {{PROJECT_NAME}}
      asset_name: {{PROJECT_NAME}}
      project_dir: helper
      scheme: {{PROJECT_NAME}}
      bundle_id: com.example.{{PROJECT_NAME}}  # TODO(bootstrap): your reverse-DNS bundle id
      marketing_version: ${{ needs.version.outputs.marketing }}
      # app_groups and profile_names take newline-separated bundle=value pairs,
      # and app_groups requires profile_names so every claim is
      # profile-authorized before signing.
      app_groups: |  # TODO(bootstrap): each bundle id + the shared App Group literal
        com.example.{{PROJECT_NAME}}=group.com.example.{{PROJECT_NAME}}
{{#WIDGET}}
        com.example.{{PROJECT_NAME}}.widget=group.com.example.{{PROJECT_NAME}}
{{/WIDGET}}
      profile_names: |  # TODO(bootstrap): the stable provisioning-profile name per bundle
        com.example.{{PROJECT_NAME}}={{PROJECT_NAME}} Helper
{{#WIDGET}}
        com.example.{{PROJECT_NAME}}.widget={{PROJECT_NAME}} Widget
{{/WIDGET}}
{{#WIDGET}}
      appexes: {{PROJECT_NAME}}Widget
{{/WIDGET}}

  cask:
    needs: [version, release]
    if: needs.version.outputs.stable == 'true' && needs.release.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Assert the verified application artifact contract
        shell: bash
        env:
          ASSET_FILENAME: ${{ needs.release.outputs.asset_filename }}
          ASSET_URL: ${{ needs.release.outputs.asset_url }}
          ASSET_SHA256: ${{ needs.release.outputs.sha256 }}
        run: |
          set -euo pipefail
          expected="{{PROJECT_NAME}}-${GITHUB_REF_NAME}-darwin.zip"
          [ "$ASSET_FILENAME" = "$expected" ] \
            || { echo "::error::verified asset filename '$ASSET_FILENAME' != '$expected'"; exit 1; }
          [ -n "$ASSET_URL" ] \
            || { echo "::error::release-app returned an empty asset URL"; exit 1; }
          [[ "$ASSET_SHA256" =~ ^[0-9a-f]{64}$ ]] \
            || { echo "::error::release-app returned an invalid SHA-256"; exit 1; }

      - name: Guard cask registry name and version
        shell: bash
        env:
          CASK_TOKEN: {{PROJECT_NAME}}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2153 # VERSION is supplied through the step env.
          version="${VERSION#v}"
          tmp="$(mktemp -d)"

          fetch() {
            url="$1"
            output="$2"
            if ! code="$(curl --connect-timeout 15 --max-time 45 -sS -o "$output" -w '%{http_code}' "$url")"; then
              echo "::error::registry guard could not reach $url; refusing to release blind"
              exit 1
            fi
            case "$code" in
              200|404) printf '%s' "$code" ;;
              *) echo "::error::registry guard got HTTP $code from $url; refusing to release blind"; exit 1 ;;
            esac
          }

          formula_url="https://raw.githubusercontent.com/{{GITHUB_USER}}/homebrew-tap/main/Formula/${CASK_TOKEN}.rb"
          formula_code="$(fetch "$formula_url" "$tmp/formula.rb")"
          if [ "$formula_code" = "200" ]; then
            echo "::error::Formula/${CASK_TOKEN}.rb already exists; a same-named cask would make brew install ambiguous"
            exit 1
          fi

          cask_url="https://raw.githubusercontent.com/{{GITHUB_USER}}/homebrew-tap/main/Casks/${CASK_TOKEN}.rb"
          cask_code="$(fetch "$cask_url" "$tmp/cask.rb")"
          if [ "$cask_code" = "404" ]; then
            exit 0
          fi
          grep -Eq "^[[:space:]]*cask[[:space:]]+\"${CASK_TOKEN}\"[[:space:]]+do" "$tmp/cask.rb" \
            || { echo "::error::the registered Casks/${CASK_TOKEN}.rb declares a different cask name"; exit 1; }
          current="$(sed -n 's/^[[:space:]]*version[[:space:]]*\"\([0-9][0-9.]*\)\".*/\1/p' "$tmp/cask.rb" | sed -n '1p')"
          [ -n "$current" ] \
            || { echo "::error::could not parse the registered version for $CASK_TOKEN"; exit 1; }
          first="$(printf '%s\n%s\n' "$current" "$version" | sort -V | sed -n '1p')"
          if [ "$first" = "$version" ] && [ "$current" != "$version" ]; then
            echo "::error::release version $version is older than registered cask version $current"
            exit 1
          fi

      - name: Require a full-application cask template
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq '^[[:space:]]*app[[:space:]]+' helper/cask.rb.tmpl \
            || { echo "::error::cask template must install the full .app with an app stanza"; exit 1; }
          if grep -Eq '^[[:space:]]*binary[[:space:]]+' helper/cask.rb.tmpl; then
            echo "::error::cask template must not install this application as a bare binary"
            exit 1
          fi

      - name: Render the cask
        uses: {{GITHUB_USER}}/homebrew-tap/.github/actions/render-formula@f45550932b0c8a42eb04e9ab0e5de8f82ad78b6a
        with:
          template: helper/cask.rb.tmpl
          output: Casks/{{PROJECT_NAME}}.rb
          version: ${{ needs.version.outputs.marketing }}
          substitutions: |
            __ASSET_URL__=${{ needs.release.outputs.asset_url }}
            __SHA_APP__=${{ needs.release.outputs.sha256 }}
            __APP_NAME__={{PROJECT_NAME}}
            __CASK_TOKEN__={{PROJECT_NAME}}

      - name: Publish the cask to the tap
        uses: {{GITHUB_USER}}/homebrew-tap/.github/actions/publish@f45550932b0c8a42eb04e9ab0e5de8f82ad78b6a
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "{{PROJECT_NAME}} ${{ github.ref_name }}"
