name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
{{#FEATURE_DAEMONKIT}}
        run: ./scripts/test.sh -race ./...
{{/FEATURE_DAEMONKIT}}
{{^FEATURE_DAEMONKIT}}
        run: go test -race ./...
{{/FEATURE_DAEMONKIT}}
      - name: Build
        run: go build ./...
{{#FEATURE_DAEMONKIT}}
      - name: Build (pure, CGO_ENABLED=0)
        run: CGO_ENABLED=0 go build ./...
{{/FEATURE_DAEMONKIT}}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
