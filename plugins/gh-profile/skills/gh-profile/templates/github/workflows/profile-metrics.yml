# Opt-in (--with metrics, `max` intensity): lowlighter/metrics needs a classic
# PAT stored as METRICS_TOKEN — the default GITHUB_TOKEN is not enough for
# every plugin.
name: Profile metrics

on:
  schedule:
    - cron: "{{CRON_MINUTE}} 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Render metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          base: header,repositories
          plugin_languages: yes
